<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Defense 2026 | Roguelike TD</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --gold: #ffd700; --bg: #050505; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Space Grotesk', sans-serif; color: white; }
        
        /* HUD Style */
        #hud { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; }
        .stat-card { background: rgba(0,0,0,0.8); border-left: 4px solid var(--neon); padding: 10px 20px; margin-bottom: 10px; backdrop-filter: blur(5px); }
        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--neon); }
        .val { font-size: 20px; font-weight: bold; }

        /* Full Screen Overlays */
        .overlay { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.9); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; 
        }
        .card-container { display: flex; gap: 20px; margin-top: 30px; }
        .card { 
            background: #111; border: 2px solid #333; padding: 25px; width: 180px; text-align: center;
            cursor: pointer; transition: 0.3s; pointer-events: auto;
        }
        .card:hover { border-color: var(--neon); transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,242,255,0.2); }
        
        /* Buttons & Skills */
        .btn { background: var(--neon); color: black; padding: 12px 30px; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; pointer-events: auto; }
        #skill-bar { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }
        .skill { width: 60px; height: 60px; border: 2px solid var(--neon); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; pointer-events: auto; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat-card">
            <div class="label">Sector</div>
            <div class="val" id="lvl-display">1</div>
        </div>
        <div class="stat-card">
            <div class="label">Credits / Gems</div>
            <div class="val">$<span id="gold-display">100</span> / <span id="gems-display">0</span></div>
        </div>
    </div>

    <div id="skill-bar">
        <div class="skill" id="meteor-skill" onclick="game.useMeteor()">☄️</div>
    </div>

    <div id="choice-overlay" class="overlay">
        <h1 id="choice-title">SECTOR CLEARED</h1>
        <p>Choose your tactical advantage:</p>
        <div class="card-container" id="choice-cards"></div>
    </div>

    <div id="shop-overlay" class="overlay">
        <h1>GEM RESEARCH LAB</h1>
        <div class="card-container">
            <div class="card" onclick="game.buyUpgrade('damage')">
                <h3>AMMO UPGRADE</h3>
                <p>+20% Damage</p>
                <div class="label">Cost: 10 Gems</div>
            </div>
        </div>
        <button class="btn" onclick="game.nextLevel()">DEPLOY NEXT WAVE</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        class TowerDefense {
            constructor() {
                this.level = 1;
                this.gold = 100;
                this.gems = 0;
                this.towerDamage = 25;
                this.towerRange = 10;
                this.gameActive = true;
                this.enemies = [];
                this.towers = [];
                this.bullets = [];
                this.initScene();
                this.createPath();
                this.startLevel();
            }

            initScene() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
                this.camera.position.set(0, 35, 30);
                this.camera.lookAt(0, 0, 0);

                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                document.body.appendChild(this.renderer.domElement);

                const ambient = new THREE.AmbientLight(0x404040, 2);
                const sun = new THREE.DirectionalLight(0xffffff, 1);
                sun.position.set(10, 20, 10);
                this.scene.add(ambient, sun);

                const grid = new THREE.GridHelper(60, 30, 0x222222, 0x111111);
                this.scene.add(grid);

                window.addEventListener('mousedown', (e) => this.onPlaceTower(e));
                this.clock = new THREE.Clock();
            }

            createPath() {
                this.path = new THREE.CatmullRomCurve3([
                    new THREE.Vector3(-30, 0.2, -10),
                    new THREE.Vector3(-10, 0.2, -5),
                    new THREE.Vector3(10, 0.2, 5),
                    new THREE.Vector3(30, 0.2, 10)
                ]);
                const points = this.path.getPoints(50);
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: 0x00f2ff });
                this.scene.add(new THREE.Line(geometry, material));
            }

            startLevel() {
                this.gameActive = true;
                this.enemies = [];
                document.getElementById('lvl-display').innerText = this.level;
                
                // Environmental Obstacles (Level 4 Hook)
                if(this.level === 4) this.spawnObstacle();

                let count = this.level === 3 ? 20 : (this.level === 5 ? 1 : 5);
                let speed = this.level === 2 ? 0.002 : 0.0008;
                let hp = this.level === 5 ? 3000 : 100;

                for(let i=0; i < count; i++) {
                    setTimeout(() => {
                        if(this.gameActive) this.spawnEnemy(hp, speed);
                    }, i * (this.level === 3 ? 300 : 1500));
                }
            }

            spawnEnemy(hp, speed) {
                const size = this.level === 5 ? 4 : (this.level === 3 ? 0.5 : 1);
                const geo = new THREE.BoxGeometry(size, size, size);
                const mat = new THREE.MeshStandardMaterial({ 
                    color: this.level === 5 ? 0xff0000 : 0xffffff,
                    emissive: this.level === 5 ? 0x330000 : 0x000000 
                });
                const en = new THREE.Mesh(geo, mat);
                en.userData = { hp, progress: 0, speed };
                this.scene.add(en);
                this.enemies.push(en);
            }

            spawnObstacle() {
                const rock = new THREE.Mesh(
                    new THREE.DodecahedronGeometry(4),
                    new THREE.MeshStandardMaterial({color: 0x444444})
                );
                rock.position.set(0, 2, 0);
                this.scene.add(rock);
            }

            onPlaceTower(e) {
                if(!this.gameActive || this.gold < 50) return;
                const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
                const ray = new THREE.Raycaster();
                ray.setFromCamera(mouse, this.camera);
                const intersect = ray.intersectObjects(this.scene.children)[0];
                
                if(intersect && intersect.point.y < 1) {
                    const tGeo = new THREE.CylinderGeometry(0.6, 0.8, 2);
                    const tMat = new THREE.MeshStandardMaterial({color: 0x00f2ff, emissive: 0x004444});
                    const tower = new THREE.Mesh(tGeo, tMat);
                    tower.position.set(intersect.point.x, 1, intersect.point.z);
                    this.scene.add(tower);
                    this.towers.push({obj: tower, lastShot: 0});
                    this.gold -= 50;
                    this.updateUI();
                }
            }

            useMeteor() {
                this.enemies.forEach(en => en.userData.hp -= 500);
                document.getElementById('meteor-skill').style.background = "#550000";
                setTimeout(() => document.getElementById('meteor-skill').style.background = "rgba(0,0,0,0.5)", 2000);
            }

            updateUI() {
                document.getElementById('gold-display').innerText = this.gold;
                document.getElementById('gems-display').innerText = this.gems;
            }

            winLevel() {
                this.gameActive = false;
                const overlay = document.getElementById('choice-overlay');
                const container = document.getElementById('choice-cards');
                overlay.style.display = 'flex';
                container.innerHTML = '';

                // Roguelike Reward Logic
                const rewards = [
                    { title: "Long Range", effect: () => this.towerRange += 5 },
                    { title: "Heavy Metal", effect: () => this.towerDamage += 15 }
                ];

                rewards.forEach(r => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<h3>${r.title}</h3><p>Permanent Buff</p>`;
                    div.onclick = () => {
                        r.effect();
                        overlay.style.display = 'none';
                        if(this.level === 3) document.getElementById('shop-overlay').style.display = 'flex';
                        else if(this.level === 4) { document.getElementById('meteor-skill').style.display = 'flex'; this.nextLevel(); }
                        else if(this.level === 5) alert("WORLD CONQUERED! Returning tomorrow for Daily Rewards...");
                        else this.nextLevel();
                    };
                    container.appendChild(div);
                });
            }

            buyUpgrade(type) {
                if(this.gems >= 10) {
                    this.gems -= 10;
                    if(type === 'damage') this.towerDamage *= 1.5;
                    this.updateUI();
                    alert("Research Complete!");
                }
            }

            nextLevel() {
                document.getElementById('shop-overlay').style.display = 'none';
                this.level++;
                this.startLevel();
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                if(!this.gameActive) return;

                const dt = this.clock.getElapsedTime();

                // Move Enemies
                this.enemies.forEach((en, i) => {
                    en.userData.progress += en.userData.speed;
                    if(en.userData.progress >= 1) {
                        this.scene.remove(en);
                        this.enemies.splice(i, 1);
                    } else {
                        en.position.copy(this.path.getPoint(en.userData.progress));
                    }
                });

                // Tower Logic
                this.towers.forEach(t => {
                    const target = this.enemies.find(e => e.position.distanceTo(t.obj.position) < this.towerRange);
                    if(target && dt - t.lastShot > 0.7) {
                        this.fire(t.obj.position, target);
                        t.lastShot = dt;
                    }
                });

                // Bullet Logic
                this.bullets.forEach((b, i) => {
                    b.obj.position.lerp(b.target.position, 0.2);
                    if(b.obj.position.distanceTo(b.target.position) < 0.5) {
                        b.target.userData.hp -= this.towerDamage;
                        this.scene.remove(b.obj);
                        this.bullets.splice(i, 1);
                        if(b.target.userData.hp <= 0) {
                            this.scene.remove(b.target);
                            this.enemies = this.enemies.filter(e => e !== b.target);
                            this.gold += 15; this.gems += 2;
                            this.updateUI();
                        }
                    }
                });

                if(this.enemies.length === 0 && dt > 5) this.winLevel();
                this.renderer.render(this.scene, this.camera);
            }

            fire(pos, target) {
                const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0x00f2ff}));
                b.position.copy(pos);
                this.scene.add(b);
                this.bullets.push({obj: b, target});
            }
        }

        const game = new TowerDefense();
        game.animate();
    </script>
</body>
</html>
